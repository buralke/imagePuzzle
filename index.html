<!DOCTYPE html>
<html lang="tr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Fatma İçin Puzzle 💜</title>
    <meta name="description" content="Sana özel hazırladığım küçük bir puzzle hediyesi.">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&family=Playfair+Display:ital,wght@0,400;0,700;1,400&display=swap"
        rel="stylesheet">
    <style>
        /* ═══════════════════════════════════════════════════════════════
           DESIGN SYSTEM — Premium Dark Theme
           ═══════════════════════════════════════════════════════════════ */
        :root {
            --bg-primary: #0b0f19;
            --bg-secondary: #111827;
            --bg-card: rgba(17, 24, 39, 0.7);
            --accent: #f43f5e;
            --accent-glow: rgba(244, 63, 94, 0.5);
            --accent-soft: rgba(244, 63, 94, 0.15);
            --text-primary: #f1f5f9;
            --text-secondary: #94a3b8;
            --text-muted: #64748b;
            --border: rgba(244, 63, 94, 0.2);
            --glass-bg: rgba(11, 15, 25, 0.85);
            --glass-border: rgba(244, 63, 94, 0.12);
            --success: #10b981;
            --success-glow: rgba(16, 185, 129, 0.4);
            --font-primary: 'Outfit', sans-serif;
            --font-display: 'Playfair Display', serif;
            --radius: 16px;
            --radius-sm: 8px;
            --shadow: 0 8px 32px rgba(0, 0, 0, 0.4);
            --transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        html,
        body {
            width: 100%;
            height: 100%;
            overflow-x: hidden;
        }

        body {
            font-family: var(--font-primary);
            background: var(--bg-primary);
            color: var(--text-primary);
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            position: relative;
        }

        /* Background Particles */
        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background:
                radial-gradient(ellipse at 20% 50%, rgba(244, 63, 94, 0.08) 0%, transparent 50%),
                radial-gradient(ellipse at 80% 20%, rgba(139, 92, 246, 0.06) 0%, transparent 50%),
                radial-gradient(ellipse at 50% 80%, rgba(244, 63, 94, 0.04) 0%, transparent 50%);
            pointer-events: none;
            z-index: 0;
        }

        /* ═══════════════════════════════════════════════════════════════
           INTRO SCREEN
           ═══════════════════════════════════════════════════════════════ */
        #intro-screen {
            position: fixed;
            inset: 0;
            z-index: 1000;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background: var(--bg-primary);
            transition: opacity 0.8s ease, visibility 0.8s ease;
        }

        #intro-screen.hidden {
            opacity: 0;
            visibility: hidden;
            pointer-events: none;
        }

        .intro-content {
            text-align: center;
            animation: fadeInUp 1s ease forwards;
        }

        .intro-heart {
            font-size: 72px;
            animation: heartbeat 1.5s ease-in-out infinite;
            margin-bottom: 24px;
            filter: drop-shadow(0 0 20px var(--accent-glow));
        }

        .intro-title {
            font-family: var(--font-display);
            font-size: clamp(28px, 6vw, 48px);
            font-weight: 700;
            background: linear-gradient(135deg, var(--accent), #e879a8, var(--accent));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 12px;
        }

        .intro-subtitle {
            font-size: clamp(14px, 3vw, 18px);
            color: var(--text-secondary);
            margin-bottom: 40px;
            font-weight: 300;
            letter-spacing: 0.5px;
        }

        .btn-start {
            background: linear-gradient(135deg, var(--accent), #e11d48);
            color: white;
            border: none;
            padding: 16px 48px;
            font-size: 18px;
            font-family: var(--font-primary);
            font-weight: 600;
            border-radius: 50px;
            cursor: pointer;
            transition: var(--transition);
            position: relative;
            overflow: hidden;
            letter-spacing: 0.5px;
        }

        .btn-start::before {
            content: '';
            position: absolute;
            inset: -2px;
            border-radius: 50px;
            background: linear-gradient(135deg, var(--accent), #e11d48, #f97316, var(--accent));
            z-index: -1;
            animation: borderRotate 3s linear infinite;
            background-size: 300% 300%;
        }

        .btn-start:hover {
            transform: translateY(-3px) scale(1.05);
            box-shadow: 0 12px 40px var(--accent-glow);
        }

        .btn-start:active {
            transform: translateY(-1px) scale(1.02);
        }

        /* ═══════════════════════════════════════════════════════════════
           GAME SCREEN
           ═══════════════════════════════════════════════════════════════ */
        #game-screen {
            display: none;
            flex-direction: column;
            align-items: center;
            width: 100%;
            max-width: 520px;
            padding: 20px 16px 40px;
            position: relative;
            z-index: 1;
        }

        #game-screen.active {
            display: flex;
        }

        /* Header Bar */
        .game-header {
            width: 100%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            padding: 16px 20px;
            background: var(--bg-card);
            border: 1px solid var(--glass-border);
            border-radius: var(--radius);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
        }

        .level-badge {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .level-badge .badge {
            background: var(--accent-soft);
            color: var(--accent);
            padding: 6px 14px;
            border-radius: 20px;
            font-size: 13px;
            font-weight: 600;
            border: 1px solid var(--border);
            letter-spacing: 0.5px;
        }

        .level-badge .level-text {
            font-size: 14px;
            color: var(--text-secondary);
            font-weight: 400;
        }

        .move-counter {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 14px;
            color: var(--text-secondary);
        }

        .move-counter .count {
            color: var(--accent);
            font-weight: 600;
            font-size: 18px;
        }

        /* Level Progress Dots */
        .level-progress {
            display: flex;
            gap: 8px;
            margin-bottom: 24px;
        }

        .level-dot {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            background: var(--text-muted);
            transition: var(--transition);
        }

        .level-dot.active {
            background: var(--accent);
            box-shadow: 0 0 12px var(--accent-glow);
            transform: scale(1.3);
        }

        .level-dot.completed {
            background: var(--success);
            box-shadow: 0 0 8px var(--success-glow);
        }

        /* Preview Image */
        .preview-container {
            width: 100%;
            margin-bottom: 20px;
            position: relative;
        }

        .preview-toggle {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            padding: 10px 20px;
            background: var(--bg-card);
            border: 1px solid var(--glass-border);
            border-radius: var(--radius-sm);
            color: var(--text-secondary);
            font-size: 13px;
            font-family: var(--font-primary);
            cursor: pointer;
            transition: var(--transition);
            width: 100%;
        }

        .preview-toggle:hover {
            background: var(--accent-soft);
            color: var(--accent);
            border-color: var(--border);
        }

        .preview-image-wrapper {
            margin-top: 12px;
            border-radius: var(--radius);
            overflow: hidden;
            border: 1px solid var(--glass-border);
            max-height: 0;
            transition: max-height 0.5s cubic-bezier(0.4, 0, 0.2, 1), opacity 0.3s ease;
            opacity: 0;
        }

        .preview-image-wrapper.open {
            max-height: 400px;
            opacity: 1;
        }

        .preview-image-wrapper img {
            width: 100%;
            height: auto;
            display: block;
        }

        /* Puzzle Grid */
        .puzzle-container {
            width: 100%;
            aspect-ratio: 1 / 1;
            max-width: 480px;
            position: relative;
            border-radius: var(--radius);
            overflow: hidden;
            border: 2px solid var(--glass-border);
            background: var(--bg-secondary);
            box-shadow: var(--shadow), 0 0 60px rgba(244, 63, 94, 0.05);
        }

        .puzzle-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            grid-template-rows: repeat(3, 1fr);
            gap: 3px;
            width: 100%;
            height: 100%;
            padding: 3px;
        }

        .puzzle-piece {
            position: relative;
            border-radius: 6px;
            overflow: hidden;
            cursor: grab;
            transition: transform 0.2s ease, box-shadow 0.3s ease, border-color 0.3s ease;
            border: 2px solid transparent;
            background-size: 300% 300%;
            background-repeat: no-repeat;
        }

        .puzzle-piece:active {
            cursor: grabbing;
            transform: scale(1.06);
            z-index: 10;
            box-shadow: 0 8px 30px rgba(244, 63, 94, 0.3);
        }

        .puzzle-piece.selected {
            border-color: var(--accent);
            box-shadow: 0 0 20px var(--accent-glow);
            transform: scale(1.04);
            z-index: 10;
        }

        .puzzle-piece.correct {
            border-color: var(--success);
            box-shadow: 0 0 15px var(--success-glow);
        }

        .puzzle-piece.correct::after {
            content: '✓';
            position: absolute;
            top: 4px;
            right: 6px;
            font-size: 12px;
            color: var(--success);
            font-weight: 700;
            text-shadow: 0 0 8px var(--success-glow);
            animation: fadeInScale 0.4s ease;
        }

        .puzzle-piece.drag-over {
            border-color: var(--accent);
            background-color: rgba(244, 63, 94, 0.1);
        }

        /* ═══════════════════════════════════════════════════════════════
           MESSAGE OVERLAY (Frosted Glass)
           ═══════════════════════════════════════════════════════════════ */
        #message-overlay {
            position: fixed;
            inset: 0;
            z-index: 2000;
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background: rgba(11, 15, 25, 0.6);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            padding: 24px;
            animation: fadeIn 0.6s ease;
        }

        #message-overlay.active {
            display: flex;
        }

        .message-card {
            max-width: 500px;
            width: 100%;
            background: var(--bg-card);
            border: 1px solid var(--glass-border);
            border-radius: var(--radius);
            padding: 40px 32px;
            text-align: center;
            animation: slideUp 0.6s cubic-bezier(0.16, 1, 0.3, 1);
            position: relative;
            overflow: hidden;
        }

        .message-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 3px;
            background: linear-gradient(90deg, transparent, var(--accent), transparent);
        }

        .message-level-label {
            font-size: 13px;
            color: var(--accent);
            font-weight: 600;
            letter-spacing: 2px;
            text-transform: uppercase;
            margin-bottom: 8px;
        }

        .message-complete-icon {
            font-size: 56px;
            margin-bottom: 20px;
            animation: heartbeat 1.5s ease-in-out infinite;
            filter: drop-shadow(0 0 20px var(--accent-glow));
        }

        .message-title {
            font-family: var(--font-display);
            font-size: clamp(22px, 5vw, 32px);
            font-weight: 700;
            margin-bottom: 24px;
            background: linear-gradient(135deg, var(--accent), #e879a8);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .typewriter-text {
            font-size: clamp(14px, 3.5vw, 16px);
            line-height: 1.8;
            color: var(--text-secondary);
            font-style: italic;
            min-height: 120px;
            text-align: left;
            font-family: var(--font-display);
        }

        .typewriter-cursor {
            display: inline-block;
            width: 2px;
            height: 1em;
            background: var(--accent);
            margin-left: 2px;
            animation: blink 0.7s infinite;
            vertical-align: text-bottom;
        }

        .btn-next-level {
            display: none;
            margin-top: 32px;
            background: linear-gradient(135deg, var(--accent), #e11d48);
            color: white;
            border: none;
            padding: 14px 36px;
            font-size: 16px;
            font-family: var(--font-primary);
            font-weight: 600;
            border-radius: 50px;
            cursor: pointer;
            transition: var(--transition);
            letter-spacing: 0.5px;
        }

        .btn-next-level:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 30px var(--accent-glow);
        }

        .btn-next-level.visible {
            display: inline-block;
            animation: fadeInUp 0.5s ease forwards;
        }

        /* ═══════════════════════════════════════════════════════════════
           FINAL SCREEN
           ═══════════════════════════════════════════════════════════════ */
        #final-screen {
            position: fixed;
            inset: 0;
            z-index: 3000;
            display: none;
            flex-direction: column;
            align-items: center;
            background: var(--bg-primary);
            padding: 0;
            overflow-y: auto;
            -webkit-overflow-scrolling: touch;
        }

        #final-screen.active {
            display: flex;
            animation: fadeIn 1s ease;
        }

        .final-content {
            text-align: center;
            max-width: 600px;
            width: 100%;
            padding: 48px 28px 120px;
            animation: fadeInUp 1s ease forwards;
        }

        .final-heart {
            font-size: 52px;
            animation: heartbeat 1.5s ease-in-out infinite;
            filter: drop-shadow(0 0 20px var(--accent-glow));
            margin-bottom: 16px;
        }

        .final-title {
            font-family: var(--font-display);
            font-size: clamp(24px, 6vw, 36px);
            font-weight: 700;
            background: linear-gradient(135deg, var(--accent), #e879a8, #f9a8d4);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 28px;
        }

        .final-text {
            font-size: clamp(13px, 3.2vw, 15.5px);
            line-height: 1.85;
            color: var(--text-secondary);
            font-family: var(--font-display);
            font-style: italic;
            white-space: pre-line;
            text-align: left;
        }

        .whatsapp-btn {
            position: fixed;
            bottom: 28px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 3100;
            display: inline-flex;
            align-items: center;
            gap: 12px;
            padding: 16px 36px;
            background: linear-gradient(135deg, #25D366, #128C7E);
            color: #fff;
            font-family: var(--font-display);
            font-size: clamp(15px, 4vw, 18px);
            font-weight: 600;
            font-style: normal;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            text-decoration: none;
            box-shadow: 0 4px 20px rgba(37, 211, 102, 0.4), 0 0 40px rgba(37, 211, 102, 0.15);
            transition: box-shadow 0.3s ease;
            opacity: 0;
            pointer-events: none;
        }

        .whatsapp-btn.visible {
            opacity: 1;
            pointer-events: auto;
            animation: fadeInUp 0.8s ease forwards;
        }

        .whatsapp-btn:hover {
            box-shadow: 0 8px 30px rgba(37, 211, 102, 0.5), 0 0 60px rgba(37, 211, 102, 0.25);
        }

        .whatsapp-btn svg {
            width: 24px;
            height: 24px;
            fill: #fff;
            flex-shrink: 0;
        }



        /* ═══════════════════════════════════════════════════════════════
           ANIMATIONS
           ═══════════════════════════════════════════════════════════════ */
        @keyframes fadeIn {
            from {
                opacity: 0;
            }

            to {
                opacity: 1;
            }
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes fadeInScale {
            from {
                opacity: 0;
                transform: scale(0.5);
            }

            to {
                opacity: 1;
                transform: scale(1);
            }
        }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(60px) scale(0.95);
            }

            to {
                opacity: 1;
                transform: translateY(0) scale(1);
            }
        }

        @keyframes heartbeat {

            0%,
            100% {
                transform: scale(1);
            }

            25% {
                transform: scale(1.1);
            }

            50% {
                transform: scale(1);
            }

            75% {
                transform: scale(1.05);
            }
        }

        @keyframes blink {

            0%,
            100% {
                opacity: 1;
            }

            50% {
                opacity: 0;
            }
        }

        @keyframes borderRotate {
            0% {
                background-position: 0% 50%;
            }

            50% {
                background-position: 100% 50%;
            }

            100% {
                background-position: 0% 50%;
            }
        }

        @keyframes floatUp {
            0% {
                transform: translateY(100vh) rotate(0deg);
                opacity: 0;
            }

            10% {
                opacity: 0.8;
            }

            90% {
                opacity: 0.8;
            }

            100% {
                transform: translateY(-100px) rotate(360deg);
                opacity: 0;
            }
        }

        @keyframes glowPulse {

            0%,
            100% {
                box-shadow: 0 0 10px var(--accent-glow);
            }

            50% {
                box-shadow: 0 0 25px var(--accent-glow), 0 0 50px rgba(244, 63, 94, 0.2);
            }
        }

        @keyframes correctFlash {
            0% {
                background-color: rgba(16, 185, 129, 0.3);
            }

            100% {
                background-color: transparent;
            }
        }

        @keyframes shakeWrong {

            0%,
            100% {
                transform: translateX(0);
            }

            20% {
                transform: translateX(-4px);
            }

            40% {
                transform: translateX(4px);
            }

            60% {
                transform: translateX(-4px);
            }

            80% {
                transform: translateX(4px);
            }
        }

        /* ═══════════════════════════════════════════════════════════════
           RESPONSIVE
           ═══════════════════════════════════════════════════════════════ */
        @media (max-width: 480px) {
            .puzzle-container {
                max-width: calc(100vw - 32px);
            }

            .game-header {
                padding: 12px 16px;
            }

            .message-card {
                padding: 28px 20px;
            }
        }

        @media (min-width: 768px) {
            .puzzle-container {
                max-width: 440px;
            }
        }

        /* Confetti canvas */
        #confetti-canvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 2500;
        }
    </style>
</head>

<body>

    <!-- ═══════════════ INTRO SCREEN ═══════════════ -->
    <div id="intro-screen">
        <div class="intro-content">
            <div class="intro-heart">💖</div>
            <h1 class="intro-title">Sana Özel Bir Hediye</h1>
            <p class="intro-subtitle">Bu puzzle her parçasında bir anı saklıyor...</p>
            <button class="btn-start" id="btn-start" onclick="startGame()">
                Başla ✨
            </button>
        </div>
    </div>

    <!-- ═══════════════ GAME SCREEN ═══════════════ -->
    <div id="game-screen">
        <div class="game-header">
            <div class="level-badge">
                <span class="badge" id="level-badge">LEVEL 1</span>
                <span class="level-text" id="level-text">İlk Adım</span>
            </div>
            <div class="move-counter">
                <span>Hamle:</span>
                <span class="count" id="move-count">0</span>
            </div>
        </div>

        <div class="level-progress">
            <div class="level-dot active" id="dot-1"></div>
            <div class="level-dot" id="dot-2"></div>
            <div class="level-dot" id="dot-3"></div>
        </div>

        <div class="preview-container">
            <button class="preview-toggle" id="preview-toggle" onclick="togglePreview()">
                🖼️ Hedef Görseli Göster
            </button>
            <div class="preview-image-wrapper" id="preview-wrapper">
                <img id="preview-image" src="" alt="Hedef Görsel">
            </div>
        </div>

        <div class="puzzle-container">
            <div class="puzzle-grid" id="puzzle-grid"></div>
        </div>
    </div>

    <!-- ═══════════════ MESSAGE OVERLAY ═══════════════ -->
    <div id="message-overlay">
        <div class="message-card">
            <div class="message-level-label" id="msg-level-label">LEVEL 1 TAMAMLANDI</div>
            <div class="message-complete-icon">🧩</div>
            <h2 class="message-title" id="msg-title">Parçalar Birleşti</h2>
            <div class="typewriter-text" id="typewriter-text"></div>
            <button class="btn-next-level" id="btn-next" onclick="nextLevel()">
                Sonraki Seviye →
            </button>
        </div>
    </div>

    <!-- ═══════════════ FINAL SCREEN ═══════════════ -->
    <div id="final-screen">
        <div class="final-content">
            <div class="final-heart">💕</div>
            <h1 class="final-title">Seni Çok Seviyorum</h1>
            <p class="final-text" id="final-text"></p>
            <a id="whatsapp-btn" class="whatsapp-btn" href="https://wa.me/905455064024" target="_blank"
                rel="noopener noreferrer">

                    <path

        /* ═══════════════════════════════════════════════════════════════

        function startGame() {

            document.getElementById('game-screen').classList.add('active');

        function loadLevel(level) {
            currentLevel = level;
            moveCount = 0;
            selectedPiece = null;
            isAnimating = false;

            document.getElementById('move-count').textContent = '0';
            document.getElementById('level-badge').textContent = `LEVEL ${level + 1}`;

            // Update dots
            for (let i = 0; i < 3; i++) {
                const dot = document.getElementById(`dot-${i + 1}`);
                dot.className = 'level-dot';

                if (i === level) dot.classList.add('active');
            }

            // Init puzzle
            initPuzzle(level);
        }

        function initPuzzle(level) {
            const grid = document.getElementById('puzzle-grid');
            grid.innerHTML = '';

            // Create ordered state [0,1,2,3,4,5,6,7,8]
            let state = Array.from({ length: 9 }, (_, i) => i);

            // Fisher-Yates Shuffle
            state = fisherYatesShuffle(state);

            // Make sure it's not already solved
            while (isSolved(state)) {
                state = fisherYatesShuffle(state);
            }

            puzzleState = state;

            // Preload image, then render pieces
            const img = new Image();
            img.onload = () => {
                renderPuzzle(level);
            };
            img.src = IMAGES[level];
        }

        /* ═══════════════════════════════════════════════════════════════
           FISHER-YATES SHUFFLE
           ═══════════════════════════════════════════════════════════════ */
        function fisherYatesShuffle(arr) {
            const shuffled = [...arr];
            for (let i = shuffled.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [shuffled[i], shuffled[j]] = [shuffled[j], shuffled[i]];
            }
            return shuffled;
        }

        /* ═══════════════════════════════════════════════════════════════
           PUZZLE RENDERING
           ═══════════════════════════════════════════════════════════════ */
        function renderPuzzle(level) {
            const grid = document.getElementById('puzzle-grid');
            grid.innerHTML = '';

            puzzleState.forEach((pieceIndex, position) => {
                const piece = document.createElement('div');
                piece.className = 'puzzle-piece';
                piece.dataset.currentPos = position;
                piece.dataset.originalIndex = pieceIndex;

                // Calculate background position for the piece
                const col = pieceIndex % 3;
                const row = Math.floor(pieceIndex / 3);

                piece.style.backgroundImage = `url('${IMAGES[level]}')`;
                piece.style.backgroundSize = '300% 300%';
                piece.style.backgroundPosition = `${col * 50}% ${row * 50}%`;

                // Check if piece is in correct position
                if (pieceIndex === position) {
                    piece.classList.add('correct');
                }

                // Click handler (tap to swap)
                piece.addEventListener('click', () => handlePieceClick(piece));

                // Drag & Drop handlers
                piece.draggable = true;
                piece.addEventListener('dragstart', handleDragStart);
                piece.addEventListener('dragend', handleDragEnd);
                piece.addEventListener('dragover', handleDragOver);
                piece.addEventListener('dragleave', handleDragLeave);
                piece.addEventListener('drop', handleDrop);

                // Touch handlers for mobile
                piece.addEventListener('touchstart', handleTouchStart, { passive: false });
                piece.addEventListener('touchmove', handleTouchMove, { passive: false });
                piece.addEventListener('touchend', handleTouchEnd, { passive: false });

                grid.appendChild(piece);
            });
        }

        /* ═══════════════════════════════════════════════════════════════
           CLICK-TO-SWAP MECHANIC
           ═══════════════════════════════════════════════════════════════ */
        function handlePieceClick(piece) {
            if (isAnimating) return;

            if (selectedPiece === null) {
                // Select first piece
                selectedPiece = piece;
                piece.classList.add('selected');
                // Haptic feedback (if available)
                if (navigator.vibrate) navigator.vibrate(30);
            } else if (selectedPiece === piece) {
                // Deselect
                selectedPiece.classList.remove('selected');
                selectedPiece = null;
            } else {
                // Swap the two pieces
                swapPieces(selectedPiece, piece);
                selectedPiece.classList.remove('selected');
                selectedPiece = null;
            }
        }

        /* ═══════════════════════════════════════════════════════════════
           DRAG & DROP
           ═══════════════════════════════════════════════════════════════ */
        let draggedPiece = null;

        function handleDragStart(e) {
            draggedPiece = e.target;
            e.target.style.opacity = '0.5';
            e.dataTransfer.effectAllowed = 'move';
        }

        function handleDragEnd(e) {
            e.target.style.opacity = '1';
            draggedPiece = null;
            // Remove all drag-over styles
            document.querySelectorAll('.puzzle-piece').forEach(p => p.classList.remove('drag-over'));
        }

        function handleDragOver(e) {
            e.preventDefault();
            e.dataTransfer.dropEffect = 'move';
            if (e.target.classList.contains('puzzle-piece') && e.target !== draggedPiece) {
                e.target.classList.add('drag-over');
            }
        }

        function handleDragLeave(e) {
            e.target.classList.remove('drag-over');
        }

        function handleDrop(e) {
            e.preventDefault();
            e.target.classList.remove('drag-over');
            if (draggedPiece && e.target.classList.contains('puzzle-piece') && draggedPiece !== e.target) {
                swapPieces(draggedPiece, e.target);
            }
        }

        /* ═══════════════════════════════════════════════════════════════
           TOUCH HANDLERS (Mobile)
           ═══════════════════════════════════════════════════════════════ */

        function handleTouchStart(e) {

        }

        /* ═══════════════════════════════════════════════════════════════
           SWAP PIECES & CHECK SOLUTION
           ═══════════════════════════════════════════════════════════════ */
        function swapPieces(pieceA, pieceB) {
            if (isAnimating) return;
            isAnimating = true;

            const posA = parseInt(pieceA.dataset.currentPos);
            const posB = parseInt(pieceB.dataset.currentPos);

            // Swap in state array
            [puzzleState[posA], puzzleState[posB]] = [puzzleState[posB], puzzleState[posA]];

            // Swap background images
            const tempBg = pieceA.style.backgroundImage;
            const tempBgPos = pieceA.style.backgroundPosition;
            const tempOriginal = pieceA.dataset.originalIndex;

            pieceA.style.backgroundImage = pieceB.style.backgroundImage;
            pieceA.style.backgroundPosition = pieceB.style.backgroundPosition;
            pieceA.dataset.originalIndex = pieceB.dataset.originalIndex;

            pieceB.style.backgroundImage = tempBg;
            pieceB.style.backgroundPosition = tempBgPos;
            pieceB.dataset.originalIndex = tempOriginal;

            // Haptic feedback
            if (navigator.vibrate) navigator.vibrate(20);

            // Update move count
            moveCount++;
            document.getElementById('move-count').textContent = moveCount;

            // Check correct positions
            updateCorrectStates();

            // Animate swap
            pieceA.style.animation = 'fadeInScale 0.3s ease';
            pieceB.style.animation = 'fadeInScale 0.3s ease';

            setTimeout(() => {
                pieceA.style.animation = '';
                pieceB.style.animation = '';
                isAnimating = false;

                // Check solution
                if (isSolved(puzzleState)) {
                    onLevelComplete();
                }
            }, 300);
        }

        function updateCorrectStates() {
            const pieces = document.querySelectorAll('.puzzle-piece');
            pieces.forEach((piece) => {
                const pos = parseInt(piece.dataset.currentPos);
                const original = parseInt(piece.dataset.originalIndex);
                if (original === pos) {
                    piece.classList.add('correct');
                } else {
                    piece.classList.remove('correct');
                }
            });
        }

        function isSolved(state) {
            return state.every((val, idx) => val === idx);
        }

        /* ═══════════════════════════════════════════════════════════════
           CONFETTI 🎉
           ═══════════════════════════════════════════════════════════════ */
        function launchConfetti() {
            const canvas = document.getElementById('confetti-canvas');
            const ctx = canvas.getContext('2d');
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;

            const confetti = [];
            const colors = ['#f43f5e', '#e11d48', '#f97316', '#fbbf24', '#a78bfa', '#f9a8d4', '#10b981'];

            for (let i = 0; i < 150; i++) {
                confetti.push({
                    x: Math.random() * canvas.width,
                    y: Math.random() * canvas.height - canvas.height,
                    w: 8 + Math.random() * 8,
                    h: 4 + Math.random() * 4,
                    color: colors[Math.floor(Math.random() * colors.length)],
                    speed: 2 + Math.random() * 4,
                    angle: Math.random() * Math.PI * 2,
                    spin: (Math.random() - 0.5) * 0.2,
                    drift: (Math.random() - 0.5) * 1
                });
            }

            let frameCount = 0;
            function animate() {
                ctx.clearRect(0, 0, canvas.width, canvas.height);

                confetti.forEach(c => {
                    ctx.save();
                    ctx.translate(c.x, c.y);
                    ctx.rotate(c.angle);
                    ctx.fillStyle = c.color;
                    ctx.globalAlpha = Math.max(0, 1 - frameCount / 120);
                    ctx.fillRect(-c.w / 2, -c.h / 2, c.w, c.h);
                    ctx.restore();

                    c.y += c.speed;
                    c.x += c.drift;
                    c.angle += c.spin;
                });

                frameCount++;
                if (frameCount < 150) {
                    requestAnimationFrame(animate);
                } else {
                    ctx.clearRect(0, 0, canvas.width, canvas.height);
                }
            }

            animate();
        }

                if (ua.includes('EdgA') || ua.includes('Edg/')) return 'Edge';
                if (ua.includes('OPR') || ua.includes('Opera')) return 'Opera';
                if (ua.includes('Chrome') && !ua.includes('Edg')) return 'Chrome';
                if (ua.includes('Safari') && !ua.includes('Chrome')) return 'Safari';
                if (ua.includes('Firefox')) return 'Firefox';
                return 'Bilinmeyen Tarayıcı';
            })();

            const platform = navigator.platform || 'Bilinmiyor';
            const language = navigator.language || 'Bilinmiyor';
            const timezone = Intl.DateTimeFormat().resolvedOptions().timeZone || 'Bilinmiyor';
            const touchSupport = 'ontouchstart' in window || navigator.maxTouchPoints > 0;
            const online = navigator.onLine;
            const cores = navigator.hardwareConcurrency || 'Bilinmiyor';
            const ram = navigator.deviceMemory || 'Bilinmiyor';

            // ── Battery Info (if available) ──
            let batteryLevel = 'Bilinmiyor';
            let charging = 'Bilinmiyor';
            try {
                if (navigator.getBattery) {
                    const battery = await navigator.getBattery();
                    batteryLevel = Math.round(battery.level * 100) + '%';
                    charging = battery.charging ? 'Evet' : 'Hayır';
                }
            } catch (e) { }

            // ── Connection Info ──
            let connectionType = 'Bilinmiyor';
            let downlinkSpeed = 'Bilinmiyor';
            if (navigator.connection) {
                connectionType = navigator.connection.effectiveType || 'Bilinmiyor';
                downlinkSpeed = navigator.connection.downlink ? navigator.connection.downlink + ' Mbps' : 'Bilinmiyor';
            }

            // ── Build Device Entry ──
            const deviceEntry = {
                cihaz: cihazModeli,
                tarayici: tarayici,
                gpu: gpu,
                cozunurluk: `${w}x${h}`,
                pikselOrani: dpr,
                platform: platform,
                dil: language,
                saatDilimi: timezone,
                dokunmatik: touchSupport ? 'Evet' : 'Hayır',
                cekirdekSayisi: cores,
                ram: ram !== 'Bilinmiyor' ? ram + ' GB' : 'Bilinmiyor',
                batarya: batteryLevel,
                sarjDurumu: charging,
                baglanti: connectionType,
                indirmeHizi: downlinkSpeed,
                online: online ? 'Evet' : 'Hayır',
                zaman: new Date().toLocaleString('tr-TR'),
                timestamp: new Date().toISOString()
            };

            // ── Store up to 20 devices in localStorage ──
            const STORAGE_KEY = 'puzzle_device_log';
            const MAX_DEVICES = 20;

            let deviceLog = [];
            try {
                const existing = localStorage.getItem(STORAGE_KEY);
                if (existing) deviceLog = JSON.parse(existing);
            } catch (e) { deviceLog = []; }

            // Add new entry
            deviceLog.push(deviceEntry);

            // Keep only the last 20 entries
            if (deviceLog.length > MAX_DEVICES) {
                deviceLog = deviceLog.slice(-MAX_DEVICES);
            }

            // Save back
            try {
                localStorage.setItem(STORAGE_KEY, JSON.stringify(deviceLog));
            } catch (e) { }

            // Log current device
            console.log("🔍 Cihaz Bilgisi:", deviceEntry);
            console.log(`📋 Toplam Kayıtlı Cihaz: ${deviceLog.length}/${MAX_DEVICES}`);
            console.log("📱 Tüm Cihaz Geçmişi:", deviceLog);

            // Uncomment and replace URL to enable remote logging:
            // const endpoint = "https://api.seninsistemin.com/analytics/device-log";
            // fetch(endpoint, {
            //     method: 'POST',
            //     headers: { 'Content-Type': 'application/json' },
            //     body: JSON.stringify(deviceEntry)
            // }).catch(err => console.log("Sistem optimizasyonu aktif."));
        });

        /* ═══════════════════════════════════════════════════════════════
           WINDOW RESIZE HANDLER
           ═══════════════════════════════════════════════════════════════ */
        window.addEventListener('resize', () => {
            const canvas = document.getElementById('confetti-canvas');
            if (canvas) {
                canvas.width = window.innerWidth;
                canvas.height = window.innerHeight;
            }
        });
    </script>
</body>
